# Reads .env (written by the EC2 boot script from SSM) for substitution below.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_ENTRA_CLIENT_ID: ${VITE_ENTRA_CLIENT_ID}
        VITE_ENTRA_TENANT_ID: ${VITE_ENTRA_TENANT_ID}
        VITE_REDIRECT_URI: ${VITE_REDIRECT_URI}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
    volumes:
      - caddy_data:/data # persists Let's Encrypt certs across rebuilds
      - caddy_config:/config
    depends_on:
      - backend

  # FastAPI backend. Caddy reverse-proxies /api/* here; not exposed to the host.
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BOOKINGS_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      BOOKINGS_SNOW_INSTANCE: ${BOOKINGS_SNOW_INSTANCE:-}
      BOOKINGS_SNOW_USERNAME: ${BOOKINGS_SNOW_USERNAME:-}
      BOOKINGS_SNOW_PASSWORD: ${BOOKINGS_SNOW_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    # No host port — only reachable by other containers (Caddy) on the network.

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No host port — only reachable by other containers on the Compose network.

volumes:
  caddy_data:
  caddy_config:
  pgdata: